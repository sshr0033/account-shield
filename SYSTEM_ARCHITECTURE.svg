  <text x="380" y="660" font-size="10" fill="#94a3b8">Demo fund: 5174</text>
  <text x="530" y="660" font-size="10" fill="#94a3b8">PostgreSQL: 5432</text>
  <text x="700" y="660" font-size="10" fill="#94a3b8">Redis: 6379</text>
  <text x="60" y="678" font-size="10" fill="#94a3b8">Kafka: 9092</text>
  <text x="220" y="678" font-size="10" fill="#94a3b8">Zookeeper: 2181</text>
