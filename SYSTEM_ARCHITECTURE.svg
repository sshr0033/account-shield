  <text x="323" y="466" text-anchor="middle" font-size="10" fill="#93c5fd">Full audit trail</text>

  <rect x="460" y="386" width="420" height="120" rx="10" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="476" y="404" font-size="10" fill="#64748b" letter-spacing="1">UPSTASH REDIS (SINGAPORE · SSL)</text>
  <rect x="480" y="410" width="180" height="82" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="570" y="434" text-anchor="middle" font-size="12" font-weight="600" fill="#fef2f2">failed_attempts:{ip}</text>
  <text x="570" y="450" text-anchor="middle" font-size="10" fill="#fca5a5">TTL 10 min · atomic +1</text>
  <rect x="678" y="410" width="182" height="82" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="769" y="434" text-anchor="middle" font-size="12" font-weight="600" fill="#fef2f2">permanent_block:{ip}</text>
