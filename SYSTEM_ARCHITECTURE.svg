  <line x1="300" y1="382" x2="200" y2="402" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="382" x2="700" y2="402" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

