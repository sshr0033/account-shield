  <text x="100" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="#eff6ff">Browser</text>
  <text x="100" y="106" text-anchor="middle" font-size="10" fill="#93c5fd">Melbourne</text>

  <rect x="180" y="64" width="160" height="64" rx="8" fill="#0f766e" stroke="#14b8a6" stroke-width="1"/>
  <text x="260" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="#f0fdfa">Fraud Console</text>
  <text x="260" y="106" text-anchor="middle" font-size="10" fill="#99f6e4">Render Static Site · HTTPS</text>

  <rect x="360" y="64" width="180" height="64" rx="8" fill="#0f766e" stroke="#14b8a6" stroke-width="1"/>
