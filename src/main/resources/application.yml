spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/accountshield}
    username: ${DB_USERNAME:shield}
    password: ${DB_PASSWORD:shield_pw}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: account-shield-detection
      auto-offset-reset: earliest
    listener:
      auto-startup: ${KAFKA_ENABLED:true}
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
server:
  port: ${SERVER_PORT:8080}
detection:
  mode: ${DETECTION_MODE:kafka}
security:
  jwt:
    secret: ${JWT_SECRET:default-secret-for-testing}
    expiration-ms: 3600000
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174}
gemini:
  api-key: ${GEMINI_API_KEY:}
  api-url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}