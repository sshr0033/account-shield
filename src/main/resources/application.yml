spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/accountshield
    username: shield
    password: shield_pw
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: account-shield-detection
      auto-offset-reset: earliest
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:default-secret-for-testing}
    expiration-ms: 3600000

gemini:
  api-key: ${GEMINI_API_KEY}
  api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent