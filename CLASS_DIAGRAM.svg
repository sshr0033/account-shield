<svg width="900" height="860" viewBox="0 0 900 860" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <title>Account Shield — Class Diagram</title>
  <rect width="900" height="860" fill="#0f172a"/>
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Class Diagram</text>

  <!-- User -->
  <rect x="30" y="48" width="200" height="188" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <rect x="30" y="48" width="200" height="28" rx="8" fill="#1d4ed8"/>
  <rect x="30" y="68" width="200" height="8" fill="#1d4ed8"/>
  <text x="130" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#eff6ff">User</text>
  <line x1="30" y1="76" x2="230" y2="76" stroke="#334155"/>
  <text x="44" y="94" font-size="11" fill="#93c5fd">id: Long</text>
  <text x="44" y="110" font-size="11" fill="#93c5fd">tenantId: Long</text>
  <text x="44" y="126" font-size="11" fill="#93c5fd">email: String</text>
  <text x="44" y="142" font-size="11" fill="#93c5fd">passwordHash: String</text>
  <text x="44" y="158" font-size="11" fill="#93c5fd">role: Role</text>
  <text x="44" y="174" font-size="11" fill="#93c5fd">mfaEnabled: boolean</text>
  <text x="44" y="190" font-size="11" fill="#93c5fd">mfaSecret: String</text>
  <text x="44" y="206" font-size="11" fill="#93c5fd">createdAt: OffsetDateTime</text>

  <!-- Role enum -->
  <rect x="250" y="48" width="180" height="120" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <rect x="250" y="48" width="180" height="28" rx="8" fill="#4c1d95"/>
  <rect x="250" y="68" width="180" height="8" fill="#4c1d95"/>
  <text x="340" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#f5f3ff">«enum» Role</text>
  <line x1="250" y1="76" x2="430" y2="76" stroke="#334155"/>
  <text x="264" y="94" font-size="11" fill="#c4b5fd">MEMBER</text>
  <text x="264" y="110" font-size="11" fill="#c4b5fd">FRAUD_ANALYST</text>
  <text x="264" y="126" font-size="11" fill="#c4b5fd">TENANT_ADMIN</text>
  <text x="264" y="142" font-size="11" fill="#c4b5fd">PLATFORM_ADMIN</text>

  <!-- Tenant -->
  <rect x="450" y="48" width="200" height="106" rx="8" fill="#1e293b" stroke="#14b8a6" stroke-width="1"/>
  <rect x="450" y="48" width="200" height="28" rx="8" fill="#0f766e"/>
  <rect x="450" y="68" width="200" height="8" fill="#0f766e"/>
  <text x="550" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#f0fdfa">Tenant</text>
  <line x1="450" y1="76" x2="650" y2="76" stroke="#334155"/>
  <text x="464" y="94" font-size="11" fill="#99f6e4">id: Long</text>
  <text x="464" y="110" font-size="11" fill="#99f6e4">name: String</text>
  <text x="464" y="126" font-size="11" fill="#99f6e4">createdAt: OffsetDateTime</text>

  <!-- AuthController -->
  <rect x="30" y="260" width="210" height="140" rx="8" fill="#1e293b" stroke="#6b7280" stroke-width="1"/>
  <rect x="30" y="260" width="210" height="28" rx="8" fill="#374151"/>
  <rect x="30" y="280" width="210" height="8" fill="#374151"/>
  <text x="135" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#f9fafb">AuthController</text>
  <line x1="30" y1="288" x2="240" y2="288" stroke="#334155"/>
  <text x="44" y="304" font-size="11" fill="#d1d5db">detectionMode: String</text>
  <line x1="30" y1="314" x2="240" y2="314" stroke="#334155" stroke-dasharray="4 2"/>
  <text x="44" y="330" font-size="11" fill="#9ca3af">register(req): ResponseEntity</text>
  <text x="44" y="346" font-size="11" fill="#9ca3af">login(req): ResponseEntity</text>
  <text x="44" y="362" font-size="11" fill="#9ca3af">recordAttempt(...): void</text>
  <text x="44" y="378" font-size="11" fill="#9ca3af">extractClientIp(): String</text>

  <!-- DetectionService -->
  <rect x="260" y="260" width="210" height="118" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <rect x="260" y="260" width="210" height="28" rx="8" fill="#78350f"/>
  <rect x="260" y="280" width="210" height="8" fill="#78350f"/>
  <text x="365" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#fef3c7">DetectionService</text>
  <line x1="260" y1="288" x2="470" y2="288" stroke="#334155"/>
  <text x="274" y="308" font-size="11" fill="#fde68a">analyzeAttempt(attempt)</text>
  <text x="274" y="324" font-size="11" fill="#fde68a">createAlertIfNew(</text>
  <text x="274" y="340" font-size="11" fill="#fde68a">  tenantId, type, severity,</text>
  <text x="274" y="356" font-size="11" fill="#fde68a">  details, target, id)</text>

  <!-- RateLimiterService -->
  <rect x="490" y="260" width="220" height="188" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <rect x="490" y="260" width="220" height="28" rx="8" fill="#7f1d1d"/>
  <rect x="490" y="280" width="220" height="8" fill="#7f1d1d"/>
  <text x="600" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#fef2f2">RateLimiterService</text>
  <line x1="490" y1="288" x2="710" y2="288" stroke="#334155"/>
  <text x="504" y="304" font-size="11" fill="#fca5a5">MAX_FAILURES = 5</text>
  <text x="504" y="320" font-size="11" fill="#fca5a5">WINDOW = 10 min</text>
  <line x1="490" y1="330" x2="710" y2="330" stroke="#334155" stroke-dasharray="4 2"/>
  <text x="504" y="346" font-size="11" fill="#f87171">isBlocked(ip): boolean</text>
  <text x="504" y="362" font-size="11" fill="#f87171">recordFailure(ip)</text>
  <text x="504" y="378" font-size="11" fill="#f87171">recordFailureForEmail(e)</text>
  <text x="504" y="394" font-size="11" fill="#f87171">reset(ip)</text>
  <text x="504" y="410" font-size="11" fill="#f87171">blockForever(ip)</text>
  <text x="504" y="426" font-size="11" fill="#f87171">resetAll()</text>

  <!-- AlertEntity -->
  <rect x="30" y="430" width="210" height="172" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1"/>
  <rect x="30" y="430" width="210" height="28" rx="8" fill="#be185d"/>
  <rect x="30" y="450" width="210" height="8" fill="#be185d"/>
  <text x="135" y="450" text-anchor="middle" font-size="13" font-weight="700" fill="#fff1f2">AlertEntity</text>
  <line x1="30" y1="458" x2="240" y2="458" stroke="#334155"/>
  <text x="44" y="474" font-size="11" fill="#fbcfe8">id: Long</text>
  <text x="44" y="490" font-size="11" fill="#fbcfe8">tenantId: Long</text>
  <text x="44" y="506" font-size="11" fill="#fbcfe8">type: AlertType</text>
  <text x="44" y="522" font-size="11" fill="#fbcfe8">severity: AlertSeverity</text>
  <text x="44" y="538" font-size="11" fill="#fbcfe8">details: String</text>
  <text x="44" y="554" font-size="11" fill="#fbcfe8">loginAttemptId: Long</text>
  <text x="44" y="570" font-size="11" fill="#fbcfe8">status: AlertStatus</text>
  <text x="44" y="586" font-size="11" fill="#fbcfe8">createdAt: OffsetDateTime</text>

  <!-- AlertType enum -->
  <rect x="260" y="430" width="180" height="90" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <rect x="260" y="430" width="180" height="28" rx="8" fill="#4c1d95"/>
  <rect x="260" y="450" width="180" height="8" fill="#4c1d95"/>
  <text x="350" y="450" text-anchor="middle" font-size="12" font-weight="700" fill="#f5f3ff">«enum» AlertType</text>
  <line x1="260" y1="458" x2="440" y2="458" stroke="#334155"/>
  <text x="274" y="476" font-size="11" fill="#c4b5fd">BRUTE_FORCE</text>
  <text x="274" y="494" font-size="11" fill="#c4b5fd">CREDENTIAL_STUFFING</text>

  <!-- AlertStatus enum -->
  <rect x="260" y="536" width="180" height="90" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <rect x="260" y="536" width="180" height="28" rx="8" fill="#4c1d95"/>
  <rect x="260" y="556" width="180" height="8" fill="#4c1d95"/>
  <text x="350" y="556" text-anchor="middle" font-size="12" font-weight="700" fill="#f5f3ff">«enum» AlertStatus</text>
  <line x1="260" y1="564" x2="440" y2="564" stroke="#334155"/>
  <text x="274" y="582" font-size="11" fill="#c4b5fd">OPEN</text>
  <text x="274" y="598" font-size="11" fill="#c4b5fd">RESOLVED / BLOCKED</text>

  <!-- GeminiService -->
  <rect x="490" y="468" width="220" height="106" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <rect x="490" y="468" width="220" height="28" rx="8" fill="#14532d"/>
  <rect x="490" y="488" width="220" height="8" fill="#14532d"/>
  <text x="600" y="488" text-anchor="middle" font-size="13" font-weight="700" fill="#f0fdf4">GeminiService</text>
  <line x1="490" y1="496" x2="710" y2="496" stroke="#334155"/>
  <text x="504" y="516" font-size="11" fill="#86efac">explainAlert(type,</text>
  <text x="504" y="532" font-size="11" fill="#86efac">  severity, details): String</text>
  <text x="504" y="548" font-size="11" fill="#86efac">extractText(response): String</text>

  <!-- MfaService -->
  <rect x="30" y="628" width="210" height="106" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <rect x="30" y="628" width="210" height="28" rx="8" fill="#4c1d95"/>
  <rect x="30" y="648" width="210" height="8" fill="#4c1d95"/>
  <text x="135" y="648" text-anchor="middle" font-size="13" font-weight="700" fill="#f5f3ff">MfaService</text>
  <line x1="30" y1="656" x2="240" y2="656" stroke="#334155"/>
  <text x="44" y="674" font-size="11" fill="#c4b5fd">generateSecret(): String</text>
  <text x="44" y="690" font-size="11" fill="#c4b5fd">generateQrCodeDataUri(</text>
  <text x="44" y="706" font-size="11" fill="#c4b5fd">  email, secret): String</text>
  <text x="44" y="722" font-size="11" fill="#c4b5fd">verifyCode(secret,code): bool</text>

  <!-- LoginAttempt -->
  <rect x="260" y="650" width="210" height="172" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <rect x="260" y="650" width="210" height="28" rx="8" fill="#1d4ed8"/>
  <rect x="260" y="670" width="210" height="8" fill="#1d4ed8"/>
  <text x="365" y="670" text-anchor="middle" font-size="13" font-weight="700" fill="#eff6ff">LoginAttempt</text>
  <line x1="260" y1="678" x2="470" y2="678" stroke="#334155"/>
  <text x="274" y="696" font-size="11" fill="#93c5fd">id: Long</text>
  <text x="274" y="712" font-size="11" fill="#93c5fd">tenantId: Long</text>
  <text x="274" y="728" font-size="11" fill="#93c5fd">userId: Long (nullable)</text>
  <text x="274" y="744" font-size="11" fill="#93c5fd">emailAttempted: String</text>
  <text x="274" y="760" font-size="11" fill="#93c5fd">ipAddress: String</text>
  <text x="274" y="776" font-size="11" fill="#93c5fd">success: boolean</text>
  <text x="274" y="792" font-size="11" fill="#93c5fd">createdAt: OffsetDateTime</text>

  <!-- JwtService -->
  <rect x="490" y="596" width="220" height="106" rx="8" fill="#1e293b" stroke="#6b7280" stroke-width="1"/>
  <rect x="490" y="596" width="220" height="28" rx="8" fill="#374151"/>
  <rect x="490" y="616" width="220" height="8" fill="#374151"/>
  <text x="600" y="616" text-anchor="middle" font-size="13" font-weight="700" fill="#f9fafb">JwtService</text>
  <line x1="490" y1="624" x2="710" y2="624" stroke="#334155"/>
  <text x="504" y="642" font-size="11" fill="#d1d5db">secret: String</text>
  <text x="504" y="658" font-size="11" fill="#d1d5db">expirationMs: long</text>
  <line x1="490" y1="668" x2="710" y2="668" stroke="#334155" stroke-dasharray="4 2"/>
  <text x="504" y="684" font-size="11" fill="#9ca3af">generate(user): String</text>
  <text x="504" y="700" font-size="11" fill="#9ca3af">parse(token): Claims</text>

  <!-- Kafka classes -->
  <rect x="490" y="724" width="210" height="90" rx="8" fill="#1e293b" stroke="#6b7280" stroke-width="1"/>
  <rect x="490" y="724" width="210" height="28" rx="8" fill="#374151"/>
  <rect x="490" y="744" width="210" height="8" fill="#374151"/>
  <text x="595" y="744" text-anchor="middle" font-size="12" font-weight="700" fill="#f9fafb">LoginAttemptProducer</text>
  <line x1="490" y1="752" x2="700" y2="752" stroke="#334155"/>
  <text x="504" y="770" font-size="11" fill="#d1d5db">TOPIC = "login-attempts"</text>
  <text x="504" y="786" font-size="11" fill="#d1d5db">publishAttemptId(id)</text>

  <!-- Relationship lines -->
  <line x1="230" y1="130" x2="250" y2="100" stroke="#6b7280" stroke-width="0.8" stroke-dasharray="4 2"/>
  <line x1="135" y1="248" x2="135" y2="260" stroke="#6b7280" stroke-width="0.8" marker-end="url(#arr2)"/>
  <line x1="240" y1="330" x2="260" y2="330" stroke="#6b7280" stroke-width="0.8" marker-end="url(#arr2)"/>
  <line x1="240" y1="290" x2="490" y2="290" stroke="#6b7280" stroke-width="0.8" marker-end="url(#arr2)"/>
  <line x1="365" y1="378" x2="135" y2="430" stroke="#6b7280" stroke-width="0.8" marker-end="url(#arr2)"/>

  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
</svg>
