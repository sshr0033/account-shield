<svg width="900" height="820" viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <title>Account Shield — High-Level Design</title>
  <desc>Three-tier architecture: client, API, and data layers with event-driven detection pipeline</desc>

  <!-- Background -->
  <rect width="900" height="820" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Account Shield — High-Level Design</text>

  <!-- CLIENT TIER -->
  <rect x="40" y="55" width="820" height="120" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="58" y="76" font-size="11" fill="#64748b" letter-spacing="1">CLIENT TIER</text>

  <rect x="60" y="85" width="230" height="72" rx="8" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1"/>
  <text x="175" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#eff6ff">Fraud Detection Console</text>
  <text x="175" y="134" text-anchor="middle" font-size="11" fill="#93c5fd">React 18 · Redux · MUI</text>

  <rect x="310" y="85" width="200" height="72" rx="8" fill="#0f766e" stroke="#14b8a6" stroke-width="1"/>
  <text x="410" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#f0fdfa">Demo Super Fund</text>
  <text x="410" y="134" text-anchor="middle" font-size="11" fill="#99f6e4">Attack Simulator · React</text>

  <rect x="530" y="85" width="160" height="72" rx="8" fill="#6d28d9" stroke="#8b5cf6" stroke-width="1"/>
  <text x="610" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#f5f3ff">CDN / Static</text>
  <text x="610" y="134" text-anchor="middle" font-size="11" fill="#c4b5fd">Render Static Site</text>

  <rect x="710" y="85" width="130" height="72" rx="8" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="775" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#f9fafb">HTTPS + JWT</text>
  <text x="775" y="134" text-anchor="middle" font-size="11" fill="#d1d5db">TLS 1.3 · HS256</text>

  <!-- Arrow down -->
  <line x1="450" y1="175" x2="450" y2="205" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="462" y="193" font-size="11" fill="#64748b">HTTPS · JWT Bearer</text>

  <!-- API TIER -->
  <rect x="40" y="209" width="820" height="240" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="58" y="230" font-size="11" fill="#64748b" letter-spacing="1">API TIER — Spring Boot 4 / Java 21 / Tomcat 11</text>

  <rect x="60" y="238" width="170" height="60" rx="8" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="145" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#f9fafb">JWT Auth Filter</text>
  <text x="145" y="282" text-anchor="middle" font-size="11" fill="#9ca3af">Role + tenantId claims</text>

  <rect x="248" y="238" width="170" height="60" rx="8" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="333" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#f9fafb">Security Config</text>
  <text x="333" y="282" text-anchor="middle" font-size="11" fill="#9ca3af">RBAC · CORS · stateless</text>

  <rect x="436" y="238" width="170" height="60" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="521" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#fef2f2">Rate Limiter</text>
  <text x="521" y="282" text-anchor="middle" font-size="11" fill="#fca5a5">Redis counters · IP block</text>

  <rect x="624" y="238" width="216" height="60" rx="8" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="732" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#f9fafb">MFA Service</text>
  <text x="732" y="282" text-anchor="middle" font-size="11" fill="#9ca3af">TOTP RFC 6238 · QR enroll</text>

  <!-- Row 2 controllers -->
  <rect x="60" y="318" width="240" height="60" rx="8" fill="#0f766e" stroke="#14b8a6" stroke-width="1"/>
  <text x="180" y="344" text-anchor="middle" font-size="12" font-weight="600" fill="#f0fdfa">Auth Controller</text>
  <text x="180" y="362" text-anchor="middle" font-size="11" fill="#99f6e4">Login · Register · MFA</text>

  <rect x="318" y="318" width="220" height="60" rx="8" fill="#0f766e" stroke="#14b8a6" stroke-width="1"/>
  <text x="428" y="344" text-anchor="middle" font-size="12" font-weight="600" fill="#f0fdfa">Analyst API</text>
  <text x="428" y="362" text-anchor="middle" font-size="11" fill="#99f6e4">Alerts · Explain · Block</text>

  <rect x="556" y="318" width="284" height="60" rx="8" fill="#0f766e" stroke="#14b8a6" stroke-width="1"/>
  <text x="698" y="344" text-anchor="middle" font-size="12" font-weight="600" fill="#f0fdfa">Admin APIs</text>
  <text x="698" y="362" text-anchor="middle" font-size="11" fill="#99f6e4">Tenants · Members · Enquiries</text>

  <!-- Detection pipeline bar -->
  <rect x="60" y="398" width="780" height="36" rx="6" fill="#78350f" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="421" text-anchor="middle" font-size="12" font-weight="600" fill="#fef3c7">Detection Pipeline — sync mode (inline) or Kafka async (DETECTION_MODE env var)</text>

  <!-- Arrows down to data -->
  <line x1="300" y1="449" x2="300" y2="479" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="449" x2="600" y2="479" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DATA TIER -->
  <rect x="40" y="483" width="820" height="130" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="58" y="504" font-size="11" fill="#64748b" letter-spacing="1">DATA TIER</text>

  <rect x="60" y="512" width="220" height="84" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="170" y="542" text-anchor="middle" font-size="13" font-weight="600" fill="#eff6ff">PostgreSQL 16</text>
  <text x="170" y="560" text-anchor="middle" font-size="11" fill="#93c5fd">users · tenants · attempts</text>
  <text x="170" y="576" text-anchor="middle" font-size="11" fill="#93c5fd">alerts · enquiries</text>

  <rect x="300" y="512" width="200" height="84" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="542" text-anchor="middle" font-size="13" font-weight="600" fill="#fef2f2">Redis (Upstash)</text>
  <text x="400" y="560" text-anchor="middle" font-size="11" fill="#fca5a5">IP counters · blocks</text>
  <text x="400" y="576" text-anchor="middle" font-size="11" fill="#fca5a5">email counters · TTL</text>

  <rect x="520" y="512" width="200" height="84" rx="8" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="620" y="542" text-anchor="middle" font-size="13" font-weight="600" fill="#f9fafb">Apache Kafka</text>
  <text x="620" y="560" text-anchor="middle" font-size="11" fill="#d1d5db">login-attempts topic</text>
  <text x="620" y="576" text-anchor="middle" font-size="11" fill="#d1d5db">async detection events</text>

  <rect x="740" y="512" width="100" height="84" rx="8" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="790" y="542" text-anchor="middle" font-size="13" font-weight="600" fill="#f9fafb">Flyway</text>
  <text x="790" y="560" text-anchor="middle" font-size="11" fill="#d1d5db">migrations</text>
  <text x="790" y="576" text-anchor="middle" font-size="11" fill="#d1d5db">on boot</text>

  <!-- Arrow to external -->
  <line x1="450" y1="613" x2="450" y2="648" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="462" y="634" font-size="11" fill="#64748b">REST · API key</text>

  <!-- EXTERNAL -->
  <rect x="200" y="652" width="500" height="72" rx="12" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="450" y="684" text-anchor="middle" font-size="14" font-weight="600" fill="#f0fdf4">Google Gemini 2.0 Flash</text>
  <text x="450" y="706" text-anchor="middle" font-size="12" fill="#86efac">AI-generated alert explanations · domain-specific triage · graceful fallback</text>

  <!-- Legend -->
  <rect x="40" y="742" width="820" height="62" rx="8" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="450" y="762" text-anchor="middle" font-size="11" fill="#64748b">Detection Modes</text>
  <rect x="60" y="772" width="10" height="10" rx="2" fill="#f59e0b"/>
  <text x="76" y="782" font-size="11" fill="#94a3b8">sync: auth controller calls DetectionService inline — no Kafka needed (Render deployment)</text>
  <rect x="60" y="788" width="10" height="10" rx="2" fill="#6b7280"/>
  <text x="76" y="798" font-size="11" fill="#94a3b8">kafka: attempt ID published to topic, consumer analyses asynchronously (local/full-stack)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
</svg>
