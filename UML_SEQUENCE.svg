<svg width="900" height="800" viewBox="0 0 900 800" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <title>Account Shield — UML Sequence Diagram</title>
  <rect width="900" height="800" fill="#0f172a"/>
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">UML Sequence Diagram — Full Analyst Session</text>

  <!-- Lifeline headers -->
  <rect x="20" y="40" width="80" height="32" rx="6" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1"/>
  <text x="60" y="61" text-anchor="middle" font-size="11" font-weight="600" fill="#eff6ff">Client</text>

  <rect x="120" y="40" width="90" height="32" rx="6" fill="#0f766e" stroke="#14b8a6" stroke-width="1"/>
  <text x="165" y="61" text-anchor="middle" font-size="11" font-weight="600" fill="#f0fdfa">AuthCtrl</text>

  <rect x="230" y="40" width="70" height="32" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="265" y="61" text-anchor="middle" font-size="11" font-weight="600" fill="#fef2f2">Redis</text>

  <rect x="320" y="40" width="70" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="355" y="61" text-anchor="middle" font-size="11" font-weight="600" fill="#eff6ff">DB</text>

  <rect x="410" y="40" width="70" height="32" rx="6" fill="#4c1d95" stroke="#8b5cf6" stroke-width="1"/>
  <text x="445" y="61" text-anchor="middle" font-size="11" font-weight="600" fill="#f5f3ff">MFA</text>

  <rect x="500" y="40" width="70" height="32" rx="6" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="535" y="61" text-anchor="middle" font-size="11" font-weight="600" fill="#f9fafb">Kafka</text>

  <rect x="590" y="40" width="80" height="32" rx="6" fill="#78350f" stroke="#f59e0b" stroke-width="1"/>
  <text x="630" y="61" text-anchor="middle" font-size="11" font-weight="600" fill="#fef3c7">Detection</text>

  <rect x="690" y="40" width="80" height="32" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="730" y="61" text-anchor="middle" font-size="11" font-weight="600" fill="#f0fdf4">Gemini</text>

  <rect x="790" y="40" width="90" height="32" rx="6" fill="#0f766e" stroke="#14b8a6" stroke-width="1"/>
  <text x="835" y="61" text-anchor="middle" font-size="11" font-weight="600" fill="#f0fdfa">AnalystCtrl</text>

  <!-- Lifelines -->
  <line x1="60" y1="72" x2="60" y2="790" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="165" y1="72" x2="165" y2="790" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="265" y1="72" x2="265" y2="790" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="355" y1="72" x2="355" y2="790" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="445" y1="72" x2="445" y2="790" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="535" y1="72" x2="535" y2="790" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="630" y1="72" x2="630" y2="790" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="730" y1="72" x2="730" y2="790" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="835" y1="72" x2="835" y2="790" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- Phase 1 header -->
  <rect x="20" y="86" width="860" height="16" rx="3" fill="#1e293b"/>
  <text x="450" y="98" text-anchor="middle" font-size="11" fill="#64748b">Phase 1 — Authentication</text>

  <!-- Messages -->
  <line x1="60" y1="116" x2="163" y2="116" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="108" y="112" text-anchor="middle" font-size="10" fill="#93c5fd">POST /api/auth/login</text>

  <line x1="165" y1="132" x2="263" y2="132" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="212" y="128" text-anchor="middle" font-size="10" fill="#fca5a5">isBlocked(ip)?</text>
  <line x1="263" y1="146" x2="167" y2="146" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#ar)"/>
  <text x="212" y="158" text-anchor="middle" font-size="10" fill="#9ca3af">false</text>

  <line x1="165" y1="168" x2="353" y2="168" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="257" y="164" text-anchor="middle" font-size="10" fill="#93c5fd">findByEmail()</text>
  <line x1="353" y1="182" x2="167" y2="182" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#ab)"/>
  <text x="257" y="194" text-anchor="middle" font-size="10" fill="#9ca3af">User</text>

  <text x="175" y="210" font-size="10" fill="#9ca3af">BCrypt.matches() — local computation</text>

  <line x1="165" y1="220" x2="353" y2="220" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="257" y="216" text-anchor="middle" font-size="10" fill="#93c5fd">saveLoginAttempt()</text>
  <line x1="353" y1="234" x2="167" y2="234" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#ab)"/>
  <text x="257" y="246" text-anchor="middle" font-size="10" fill="#9ca3af">saved attempt</text>

  <line x1="165" y1="256" x2="443" y2="256" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#av)"/>
  <text x="302" y="252" text-anchor="middle" font-size="10" fill="#c4b5fd">verifyCode(secret, mfaCode)</text>
  <line x1="443" y1="270" x2="167" y2="270" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#av)"/>
  <text x="302" y="282" text-anchor="middle" font-size="10" fill="#9ca3af">true</text>

  <line x1="165" y1="292" x2="533" y2="292" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="347" y="288" text-anchor="middle" font-size="10" fill="#d1d5db">publishAttemptId(id)</text>

  <line x1="163" y1="308" x2="62" y2="308" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#ab)"/>
  <text x="108" y="320" text-anchor="middle" font-size="10" fill="#9ca3af">JWT token (200 OK)</text>

  <!-- Phase 2 header -->
  <rect x="20" y="332" width="860" height="16" rx="3" fill="#1e293b"/>
  <text x="450" y="344" text-anchor="middle" font-size="11" fill="#64748b">Phase 2 — Async Kafka Detection</text>

  <line x1="628" y1="360" x2="537" y2="360" stroke="#6b7280" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#ag)"/>
  <text x="580" y="356" text-anchor="middle" font-size="10" fill="#9ca3af">consume(attemptId)</text>

  <line x1="630" y1="376" x2="353" y2="376" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#aa)"/>
  <text x="490" y="372" text-anchor="middle" font-size="10" fill="#fde68a">findById(id)</text>
  <line x1="353" y1="390" x2="628" y2="390" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#aa)"/>
  <text x="490" y="402" text-anchor="middle" font-size="10" fill="#9ca3af">LoginAttempt</text>

  <line x1="630" y1="412" x2="353" y2="412" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#aa)"/>
  <text x="490" y="408" text-anchor="middle" font-size="10" fill="#fde68a">countFailedForEmail(10min)</text>
  <line x1="353" y1="426" x2="628" y2="426" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#aa)"/>
  <text x="490" y="438" text-anchor="middle" font-size="10" fill="#9ca3af">≥5 → BRUTE_FORCE</text>

  <line x1="630" y1="448" x2="353" y2="448" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#aa)"/>
  <text x="490" y="444" text-anchor="middle" font-size="10" fill="#fde68a">countRecentOpenAlerts()</text>
  <line x1="353" y1="462" x2="628" y2="462" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#aa)"/>
  <text x="490" y="474" text-anchor="middle" font-size="10" fill="#9ca3af">0 (new — save alert)</text>

  <line x1="630" y1="484" x2="353" y2="484" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#aa)"/>
  <text x="490" y="480" text-anchor="middle" font-size="10" fill="#fde68a">alerts.save(AlertEntity)</text>

  <!-- Phase 3 header -->
  <rect x="20" y="500" width="860" height="16" rx="3" fill="#1e293b"/>
  <text x="450" y="512" text-anchor="middle" font-size="11" fill="#64748b">Phase 3 — Analyst Triages Alert with AI</text>

  <line x1="60" y1="528" x2="833" y2="528" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#at)"/>
  <text x="446" y="524" text-anchor="middle" font-size="10" fill="#99f6e4">GET /api/analyst/alerts</text>
  <line x1="833" y1="542" x2="62" y2="542" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#at)"/>
  <text x="446" y="554" text-anchor="middle" font-size="10" fill="#9ca3af">[AlertEntity list]</text>

  <line x1="60" y1="564" x2="833" y2="564" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#at)"/>
  <text x="446" y="560" text-anchor="middle" font-size="10" fill="#99f6e4">POST /alerts/{id}/explain</text>

  <line x1="835" y1="580" x2="353" y2="580" stroke="#22c55e" stroke-width="1.5" marker-end="url(#agr)"/>
  <text x="596" y="576" text-anchor="middle" font-size="10" fill="#86efac">alerts.findById()</text>
  <line x1="353" y1="594" x2="833" y2="594" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#agr)"/>
  <text x="596" y="606" text-anchor="middle" font-size="10" fill="#9ca3af">AlertEntity</text>

  <line x1="835" y1="616" x2="728" y2="616" stroke="#22c55e" stroke-width="1.5" marker-end="url(#agr)"/>
  <text x="782" y="612" text-anchor="middle" font-size="10" fill="#86efac">Gemini API call</text>
  <line x1="728" y1="630" x2="837" y2="630" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#agr)"/>
  <text x="782" y="642" text-anchor="middle" font-size="10" fill="#9ca3af">AI explanation</text>

  <line x1="833" y1="652" x2="62" y2="652" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#at)"/>
  <text x="446" y="648" text-anchor="middle" font-size="10" fill="#9ca3af">{ alertId, explanation } 200</text>

  <!-- Phase 4 header -->
  <rect x="20" y="668" width="860" height="16" rx="3" fill="#1e293b"/>
  <text x="450" y="680" text-anchor="middle" font-size="11" fill="#64748b">Phase 4 — Block IP Permanently</text>

  <line x1="60" y1="696" x2="833" y2="696" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#at)"/>
  <text x="446" y="692" text-anchor="middle" font-size="10" fill="#99f6e4">POST /alerts/{id}/block-forever</text>

  <line x1="835" y1="712" x2="263" y2="712" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="549" y="708" text-anchor="middle" font-size="10" fill="#fca5a5">blockForever(ip) → permanent_block:{ip} no TTL</text>

  <line x1="833" y1="728" x2="62" y2="728" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#at)"/>
  <text x="446" y="740" text-anchor="middle" font-size="10" fill="#9ca3af">{ status: BLOCKED } 200</text>

  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="av" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="aa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="at" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#14b8a6" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="agr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
</svg>
